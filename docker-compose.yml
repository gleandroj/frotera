version: '3.8'

services:
  rsfrotas_minio:
    image: minio/minio:latest
    container_name: rsfrotas-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  rsfrotas_minio_init:
    image: minio/mc:latest
    container_name: rsfrotas-minio-init
    depends_on:
      - rsfrotas_minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://rsfrotas-minio:9000 minioadmin minioadmin;
      mc mb myminio/local --ignore-existing;
      mc anonymous set download myminio/local;
      exit 0;
      "

  rsfrotas_postgres:
    image: postgres:16-alpine
    container_name: rsfrotas-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rsfrotas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rsfrotas_redis:
    image: redis:7-alpine
    container_name: rsfrotas-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  minio-data:
  pgdata:
  redis-data:
